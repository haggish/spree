<main>
  <h1>EVENTS TODAY {{ dateForTitle() }}</h1>
  <ul>
    @for (event of events.value() ?? []; track event.id) {
      <li>
        <span><strong>{{ event.author }}</strong></span>
        <span>{{ event.name }}</span>
        <span>{{ event.venue.name }}</span>
      </li>
    }
  </ul>
</main>
<router-outlet />
