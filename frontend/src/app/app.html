<nav mat-tab-nav-bar [tabPanel]="tabPanel">
  @for (link of navLinks; track link.path) {
    <a mat-tab-link
       [routerLink]="link.path"
       routerLinkActive
       #rla="routerLinkActive"
       [active]="rla.isActive"
       [routerLinkActiveOptions]="{ exact: link.path === '/' }">
      {{ link.label }}
    </a>
  }
</nav>
<mat-tab-nav-panel #tabPanel>
  <router-outlet />
</mat-tab-nav-panel>
